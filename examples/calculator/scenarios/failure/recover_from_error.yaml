scenario: recover_from_error
narrative: "After 5 / 0 errors, clear lets the user start a valid calculation"

setup:
  - create: Calculator("s1")
    context:
      session_id: "s1"
      accumulator: 0.0
      pending_operator: null
      current_operand: ""
      display: "0"
  - create: OperationLog("s1")
    context:
      session_id: "s1"
      entries: []

steps:
  - fire: Calculator("s1").input_digit
    args: { digit: "5" }
  - fire: Calculator("s1").select_operator
    args: { operator: "/" }
  - fire: Calculator("s1").input_digit
    args: { digit: "0" }
  - fire: Calculator("s1").compute
  - assert:
      states:
        Calculator("s1"): error
  - fire: Calculator("s1").clear
  - assert:
      states:
        Calculator("s1"): idle
  - fire: Calculator("s1").input_digit
    args: { digit: "8" }
  - fire: Calculator("s1").select_operator
    args: { operator: "/" }
  - fire: Calculator("s1").input_digit
    args: { digit: "2" }
  - fire: Calculator("s1").compute

expect:
  states:
    Calculator("s1"): result_shown
  events_emitted:
    - calc.errored
    - calc.cleared
    - calc.computed
