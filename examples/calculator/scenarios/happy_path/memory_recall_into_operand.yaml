scenario: memory_recall_into_operand
narrative: "After 5 + , press MR with memory=4 to get 5 + 4 = 9"

setup:
  - create: Calculator("s1")
    context:
      session_id: "s1"
      accumulator: 0.0
      pending_operator: null
      current_operand: ""
      display: "0"
  - create: MemoryRegister("s1")
    context:
      session_id: "s1"
      memory: 0.0
  - create: OperationLog("s1")
    context:
      session_id: "s1"
      entries: []

steps:
  - fire: Calculator("s1").input_digit
    args: { digit: "4" }
  - fire: Calculator("s1").request_memory_set
  - fire: Calculator("s1").clear
  - fire: Calculator("s1").input_digit
    args: { digit: "5" }
  - fire: Calculator("s1").select_operator
    args: { operator: "+" }
  - assert:
      states:
        Calculator("s1"): operator_pending
  - fire: Calculator("s1").request_memory_recall
  - assert:
      states:
        Calculator("s1"): entering_second
  - fire: Calculator("s1").compute

expect:
  states:
    Calculator("s1"): result_shown
  events_emitted:
    - calc.computed
    - memory.recalled
    - calc.value_loaded
