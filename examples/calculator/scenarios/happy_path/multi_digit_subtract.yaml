scenario: multi_digit_subtract
narrative: "12 - 5 = 7 (multi-digit operand buffering)"

setup:
  - create: Calculator("s1")
    context:
      session_id: "s1"
      accumulator: 0.0
      pending_operator: null
      current_operand: ""
      display: "0"
  - create: OperationLog("s1")
    context:
      session_id: "s1"
      entries: []

steps:
  - fire: Calculator("s1").input_digit
    args: { digit: "1" }
  - fire: Calculator("s1").input_digit
    args: { digit: "2" }
  - fire: Calculator("s1").select_operator
    args: { operator: "-" }
  - fire: Calculator("s1").input_digit
    args: { digit: "5" }
  - fire: Calculator("s1").compute

expect:
  states:
    Calculator("s1"): result_shown
  events_emitted:
    - calc.computed
