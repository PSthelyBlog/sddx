scenario: result_then_chain
narrative: "After 2 + 3 = 5, pressing * 2 = should yield 10 (result chains forward)"

setup:
  - create: Calculator("s1")
    context:
      session_id: "s1"
      accumulator: 0.0
      pending_operator: null
      current_operand: ""
      display: "0"
  - create: OperationLog("s1")
    context:
      session_id: "s1"
      entries: []

steps:
  - fire: Calculator("s1").input_digit
    args: { digit: "2" }
  - fire: Calculator("s1").select_operator
    args: { operator: "+" }
  - fire: Calculator("s1").input_digit
    args: { digit: "3" }
  - fire: Calculator("s1").compute
  - assert:
      states:
        Calculator("s1"): result_shown
  - fire: Calculator("s1").select_operator
    args: { operator: "*" }
  - fire: Calculator("s1").input_digit
    args: { digit: "2" }
  - fire: Calculator("s1").compute

expect:
  states:
    Calculator("s1"): result_shown
  events_emitted:
    - calc.computed
