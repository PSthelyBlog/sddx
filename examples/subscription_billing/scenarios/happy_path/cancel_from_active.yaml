scenario: cancel_from_active
narrative: "User cancels an active subscription; goes straight to cancelled."

setup:
  - create: SubscriptionLifecycle("sub_1")
    context:
      subscription_id: "sub_1"
      customer_id: "cust_1"
      plan_id: "pro_monthly"
      amount: 29.99
      billing_period_days: 30
  - create: OperationLog("sub_1")
    context:
      subscription_id: "sub_1"
      entries: []
  - create: FakePaymentProvider("provider")
    context:
      outcomes: ["succeed"]
      served: 0
  - create: PaymentAttempt("sub_1:cycle1")
    context:
      retry_id: "sub_1:cycle1"
      subscription_id: "sub_1"
      cycle: 1
      amount: 29.99
      max_attempts: 3
      base_delay: 60.0
      attempts: 0

steps:
  - fire: PaymentAttempt("sub_1:cycle1").start
  - fire: SubscriptionLifecycle("sub_1").cancel
    args:
      cancellation_reason: "user_request"

expect:
  states:
    SubscriptionLifecycle("sub_1"): cancelled
    OperationLog("sub_1"): closed
  events_emitted:
    - subscription.activated
    - subscription.cancelled
  events_not_emitted:
    - subscription.churned
