scenario: cycle_2_completes_after_active
narrative: "After activation, a second billing cycle's success keeps the subscription active and emits cycle_completed."

setup:
  - create: SubscriptionLifecycle("sub_1")
    context:
      subscription_id: "sub_1"
      customer_id: "cust_1"
      plan_id: "pro_monthly"
      amount: 29.99
      billing_period_days: 30
  - create: OperationLog("sub_1")
    context:
      subscription_id: "sub_1"
      entries: []
  - create: FakePaymentProvider("provider")
    context:
      outcomes: ["succeed", "succeed"]
      served: 0
  - create: PaymentAttempt("sub_1:cycle1")
    context:
      retry_id: "sub_1:cycle1"
      subscription_id: "sub_1"
      cycle: 1
      amount: 29.99
      max_attempts: 3
      base_delay: 60.0
      attempts: 0

steps:
  - fire: PaymentAttempt("sub_1:cycle1").start
  - assert:
      states:
        SubscriptionLifecycle("sub_1"): active
  - create: PaymentAttempt("sub_1:cycle2")
    context:
      retry_id: "sub_1:cycle2"
      subscription_id: "sub_1"
      cycle: 2
      amount: 29.99
      max_attempts: 3
      base_delay: 60.0
      attempts: 0
  - fire: PaymentAttempt("sub_1:cycle2").start

expect:
  states:
    SubscriptionLifecycle("sub_1"): active
    PaymentAttempt("sub_1:cycle1"): succeeded
    PaymentAttempt("sub_1:cycle2"): succeeded
  events_emitted:
    - subscription.activated
    - subscription.cycle_completed
  context:
    FakePaymentProvider("provider"):
      served: 2
